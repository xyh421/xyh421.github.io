<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管理App原型</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .phone-frame {
            width: 390px;
            height: 844px;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            background: #fff;
            margin: 20px;
        }
        .status-bar {
            height: 44px;
            background: #000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
        }
        .tab-bar {
            height: 83px;
            background: #fff;
            border-top: 1px solid #eee;
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
        }
        .tab-item.active {
            color: #007AFF;
        }
        .tab-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .tab-item span {
            font-size: 10px;
        }
        iframe {
            width: 100%;
            height: calc(100% - 127px);
            border: none;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="flex flex-wrap justify-center">
        <div class="phone-frame">
            <div class="status-bar">
                <span>9:41</span>
                <div>
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi ml-2"></i>
                    <i class="fas fa-battery-full ml-2"></i>
                </div>
            </div>
            <iframe src="pages/home.html" id="mainFrame"></iframe>
            <div class="tab-bar">
                <div class="tab-item active" onclick="changePage('home.html')">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </div>
                <div class="tab-item" onclick="changePage('activity.html')">
                    <i class="fas fa-running"></i>
                    <span>运动</span>
                </div>
                <div class="tab-item" onclick="changePage('diet.html')">
                    <i class="fas fa-utensils"></i>
                    <span>饮食</span>
                </div>
                <div class="tab-item" onclick="changePage('sleep.html')">
                    <i class="fas fa-moon"></i>
                    <span>睡眠</span>
                </div>
                <div class="tab-item" onclick="changePage('profile.html')">
                    <i class="fas fa-user"></i>
                    <span>我的</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changePage(page) {
            document.getElementById('mainFrame').src = 'pages/' + page;
            // 更新底部导航栏状态
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
